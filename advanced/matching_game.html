        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        }

        /* 答錯時的震動動畫 */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px) rotate(-1deg);
            }

            50% {
                transform: translateX(5px) rotate(1deg);
            }

            75% {
                transform: translateX(-5px) rotate(-1deg);
            }
        }

        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }

        /* 出現時的動畫 */
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 繪製連線的 SVG 容器設定 */
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .path-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.5s ease-out forwards;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 隱藏捲軸但可捲動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

    <script>
        const SHEET_ID = '1ydMZu_8epF_gEQQ3IjVvbvOEstqehiP__wHsONd8alo';
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzEx9q1G45YmJqwuo4GMa77zzfHsaxrcq03woKK8HgQj6xhm9duqFB26cjlW0hdOFN_cw/exec';

        let allIdiomsData = [];
        let unitsList = [];
        let currentUser = null;
        let dictPosition = localStorage.getItem('dictPosition') || 'left';
        let batchStartTime = 0;
        let currentUnitData = [];
        let currentBatch = [];
        let batchIndex = 0;
        const BATCH_SIZE = 5;
        let selectedIdiom = null;
        let selectedMeaning = null;
        let matchedPairs = [];
        let failedIdiomIds = new Set();
        let unitFailedIdiomIds = new Set();
        
        let isReinforcementMode = false;
        let reviewModeBatch = [];
        let vocabBook = new Map();
        let allReviewBanks = {};
        let unitTotalTime = 0;
        
        let leaderboardDataCache = [];

        function saveProgress() {
            if (!currentUser || currentUnitData.length === 0) return;
            const select = document.getElementById('unit-select');
            const progress = {
                unitTitle: select.options[select.selectedIndex]?.text || currentUnitData[0].unit,
                unitData: currentUnitData,
                batchIndex: batchIndex,
                unitFailedIdiomIds: Array.from(unitFailedIdiomIds)
            };
            localStorage.setItem(`${currentUser}_matchingProgress`, JSON.stringify(progress));
        }

        function clearProgress() {
            if (!currentUser) return;
            localStorage.removeItem(`${currentUser}_matchingProgress`);
        }

        function restoreProgress() {
            if (!currentUser) return false;
            const saved = localStorage.getItem(`${currentUser}_matchingProgress`);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    currentUnitData = parsed.unitData;
                    batchIndex = parsed.batchIndex;
                    unitFailedIdiomIds = new Set(parsed.unitFailedIdiomIds);
                    return true;
                } catch (e) {
                    clearProgress();
                    return false;
                }
            }
            return false;
        }

        // 初始化
        async function init() {
            await initData();
            await fetchUserData();
        }

        async function fetchUserData() {
            if (!GAS_API_URL || !currentUser) return;
            try {
                const localReview = localStorage.getItem(`${currentUser}_matchingReviewBank`);
                if (localReview) allReviewBanks = JSON.parse(localReview);
                
                const localVocab = localStorage.getItem(`${currentUser}_matchingVocabBook`);
                if (localVocab) {
                    const arr = JSON.parse(localVocab);
                    arr.forEach(item => vocabBook.set(item.idiom, item));
                }
            } catch(e) {}
            
            if (typeof renderMenuButtons === 'function') renderMenuButtons();

            try {
                const res = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getUserData', data: { username: currentUser } })
                });
                const json = await res.json();
                if (json.status === 'success' && json.data) {
                    if (json.data.matchingReviewBank) {
                        allReviewBanks = json.data.matchingReviewBank;
                        localStorage.setItem(`${currentUser}_matchingReviewBank`, JSON.stringify(allReviewBanks));
                    }
                    if (json.data.matchingVocabBook) {
                        vocabBook.clear();
                        json.data.matchingVocabBook.forEach(item => vocabBook.set(item.idiom, item));
                        localStorage.setItem(`${currentUser}_matchingVocabBook`, JSON.stringify(json.data.matchingVocabBook));
                    }
                    if (typeof renderMenuButtons === 'function') renderMenuButtons();
                }
            } catch (e) { console.error('fetchUserData err', e); }
        }

        function syncUserData() {
            if (!GAS_API_URL || !currentUser) return;
            const reviewData = allReviewBanks;
            const vocabData = Array.from(vocabBook.values());
            
            localStorage.setItem(`${currentUser}_matchingReviewBank`, JSON.stringify(reviewData));
            localStorage.setItem(`${currentUser}_matchingVocabBook`, JSON.stringify(vocabData));
            
            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'saveUserData',
                    data: {
                        username: currentUser,
                        payload: {
                            matchingReviewBank: reviewData,
                            matchingVocabBook: vocabData
                        }
                    }
                })
            }).catch(e => console.error(e));
        }

        window.toggleVocabBtn = function(event, btn, idiom, meaning, unit) {
            event.stopPropagation();
            const icon = btn.querySelector('i.ph-star');
            if (vocabBook.has(idiom)) {
                vocabBook.delete(idiom);
                btn.classList.remove('text-yellow-500');
                btn.classList.add('text-slate-300');
                icon.classList.remove('ph-fill');
                icon.classList.add('ph-bold');
            } else {
                vocabBook.set(idiom, { idiom, meaning, unit });
                btn.classList.remove('text-slate-300');
                btn.classList.add('text-yellow-500');
                icon.classList.remove('ph-bold');
                icon.classList.add('ph-fill');
            }
            syncUserData();
            if (typeof renderMenuButtons === 'function') renderMenuButtons();
        };

        function toggleVocab(idiomWord) {
            const item = allIdiomsData.find(i => i.idiom === idiomWord) || Array.from(vocabBook.values()).find(i => i.idiom === idiomWord);
            if (!item) return;

            if (vocabBook.has(item.idiom)) {
                vocabBook.delete(item.idiom);
            } else {
                vocabBook.set(item.idiom, item);
            }
            syncUserData();
            
            if (document.getElementById('screen-review').classList.contains('hidden') === false) {
                showReviewScreen();
            } else {
                renderMenuButtons();
            }
        }

        async function initData() {
            const select = document.getElementById('unit-select');
            const btnStart = document.getElementById('btn-start');
            const startIcon = document.getElementById('start-icon');
            const startText = document.getElementById('start-text');

            try {
                const baseUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                const defaultRes = await fetch(baseUrl);
                const defaultText = await defaultRes.text();
                const defaultJson = JSON.parse(defaultText.match(/(?<=.*\().*(?=\);)/s)[0]);
                const defaultSig = defaultJson.sig;

                parseAndAddData(defaultJson, '預設單元');

                const sheetNamesToTry = [];
                const chineseMap = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十'];
                for (let i = 1; i <= 20; i++) {
                    sheetNamesToTry.push(i.toString());
                    sheetNamesToTry.push(`第${chineseMap[i - 1]}單元`);
                }

                const promises = sheetNamesToTry.map(name => {
                    return fetch(`${baseUrl}&sheet=${encodeURIComponent(name)}`)
                        .then(res => res.text())
                        .then(text => {
                            if (text.includes('"status":"error"')) return null;
                            const json = JSON.parse(text.match(/(?<=.*\().*(?=\);)/s)[0]);
                            if (json.sig === defaultSig) return null;
                            return { json, name };
                        }).catch(() => null);
                });

                const results = await Promise.all(promises);
                const seenSigs = new Set([defaultSig]);
                results.forEach(res => {
                    if (res && res.json && !seenSigs.has(res.json.sig)) {
                        seenSigs.add(res.json.sig);
                        parseAndAddData(res.json, res.name);
                    }
                });

                updateUnitSelect();

            } catch (error) {
                select.innerHTML = '<option disabled>讀取失敗，請確認網路連線或試算表權限</option>';
                startText.textContent = "讀取失敗";
                startIcon.className = "ph-bold ph-warning";
            }
        }

        function parseAndAddData(data, fallbackSheetName) {
            let headerRow = data.table.cols.map(c => c.label);
            let startIndex = 0;
            if (!headerRow.some(label => label)) {
                headerRow = data.table.rows[0].c.map(cell => cell ? cell.v : '');
                startIndex = 1;
            }

            const unitIdx = headerRow.findIndex(c => c && c.includes('單元'));
            const typeIdx = headerRow.findIndex(c => c && c.includes('類別'));
            const idiomIdx = headerRow.findIndex(c => c && (c.includes('詞彙') || c.includes('成語')));
            const meaningIdx = headerRow.findIndex(c => c && c.includes('解釋'));
            const charIdx = headerRow.findIndex(c => c && (c.includes('字形') || c.includes('國字')));

            if (idiomIdx === -1 || meaningIdx === -1) return;

            let formattedSheetName = !isNaN(fallbackSheetName) ? `第 ${fallbackSheetName} 單元` : fallbackSheetName;

            for (let i = startIndex; i < data.table.rows.length; i++) {
                const row = data.table.rows[i];
                if (!row || !row.c) continue;

                const type = typeIdx >= 0 ? (row.c[typeIdx]?.v || '') : '';
                const idiom = row.c[idiomIdx]?.v;
                const meaning = row.c[meaningIdx]?.v;
                let targetChar = charIdx >= 0 ? (row.c[charIdx]?.v || '') : '';
                if (targetChar === '(無)' || targetChar === '(教材無特別註解)') targetChar = '';

                let unit = unitIdx >= 0 && row.c[unitIdx]?.v ? row.c[unitIdx].v : formattedSheetName;

                if (idiom && meaning && meaning !== '(無)' && meaning !== '(教材無特別註解)') {
                    let isIdiomType = type && (type.includes('成語') || (type.includes('試題補充') && idiom.length >= 3 && !targetChar));
                    if (isIdiomType) {
                        allIdiomsData.push({ unit: unit.trim(), idiom: idiom.trim(), meaning: meaning.trim() });
                    }
                }
            }
        }

        function getUnitNumber(unitStr) {
            const match = unitStr.match(/\d+/);
            if (match) return parseInt(match[0], 10);
            const map = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
            const cMatch = unitStr.match(/[一二三四五六七八九十]/);
            if (cMatch) return map[cMatch[0]];
            return 999;
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function selectItem(type, element) {
            if (element.classList.contains('matched')) return;
            if (type === 'idiom') {
                if (selectedIdiom) selectedIdiom.element.classList.remove('bg-emerald-100', 'border-emerald-500', 'ring-4', 'ring-emerald-200');
                selectedIdiom = { id: element.dataset.id, element: element };
                element.classList.add('bg-emerald-100', 'border-emerald-500', 'ring-4', 'ring-emerald-200');
            } else {
                if (selectedMeaning) selectedMeaning.element.classList.remove('bg-emerald-100', 'border-emerald-500', 'ring-4', 'ring-emerald-200');
                selectedMeaning = { id: element.dataset.id, element: element };
                element.classList.add('bg-emerald-100', 'border-emerald-500', 'ring-4', 'ring-emerald-200');
            }
            if (selectedIdiom && selectedMeaning) checkMatch();
        }

        function checkMatch() {
            const idiomElem = selectedIdiom.element;
            const meaningElem = selectedMeaning.element;

            if (selectedIdiom.id === selectedMeaning.id) {
                showToast("正確！", "success");
                [idiomElem, meaningElem].forEach(el => {
                    el.classList.remove('bg-emerald-100', 'border-emerald-500', 'ring-4', 'ring-emerald-200');
                    el.classList.add('bg-green-500', 'text-white', 'border-green-600', 'matched', 'shadow-inner');
                    el.classList.remove('text-emerald-800', 'text-slate-700', 'hover:border-emerald-400');
                    const dictLinks = el.querySelectorAll('a');
                    dictLinks.forEach(link => {
                        link.classList.remove('bg-emerald-50', 'bg-blue-50', 'bg-orange-50');
                        link.classList.add('bg-white/20');
                    });
                });
                matchedPairs.push({ left: idiomElem, right: meaningElem });
                drawAllLines();

                // 強化模式中答對，從錯題庫移除
                if (isReinforcementMode && !failedIdiomIds.has(selectedIdiom.id)) {
                    const matchedItem = currentUnitData.find(i => i.idiom === selectedIdiom.id) || allIdiomsData.find(i => i.idiom === selectedIdiom.id);
                    if (matchedItem && matchedItem.unit) {
                        const qUnit = matchedItem.unit;
                        if (allReviewBanks[qUnit]) {
                            allReviewBanks[qUnit] = allReviewBanks[qUnit].filter(i => i.idiom !== selectedIdiom.id);
                            if (allReviewBanks[qUnit].length === 0) {
                                delete allReviewBanks[qUnit];
                            }
                            syncUserData();
                        }
                    }
                }

                selectedIdiom = null;
                selectedMeaning = null;
                checkBatchComplete();
            } else {
                showToast("不對喔，再試試！", "error");
                failedIdiomIds.add(selectedIdiom.id);
                unitFailedIdiomIds.add(selectedIdiom.id);
                [idiomElem, meaningElem].forEach(el => {
                    el.classList.remove('bg-emerald-100', 'border-emerald-500', 'ring-4', 'ring-emerald-200');
                    el.classList.add('bg-red-100', 'border-red-400', 'shake-animation');
                    setTimeout(() => el.classList.remove('bg-red-100', 'border-red-400', 'shake-animation'), 400);
                });
                selectedIdiom = null;
                selectedMeaning = null;
            }
        }

        function checkBatchComplete() {
            if (matchedPairs.length === currentBatch.length) {
                updateProgressText();
                
                // 計算成績與傳送紀錄
                const totalQuestions = currentBatch.length;
                const failedCount = failedIdiomIds.size;
                const correctCount = Math.max(0, totalQuestions - failedCount);
                
                const timeSpent = Math.round((Date.now() - batchStartTime) / 10) / 100;
                unitTotalTime += timeSpent;
                unitTotalTime = Math.round(unitTotalTime * 100) / 100;

                setTimeout(() => {
                    const modal = document.getElementById('modal-success');
                    const isFullyComplete = ((batchIndex + 1) * BATCH_SIZE) >= currentUnitData.length;
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    
                    const batchTotal = currentBatch.length;
                    const batchCorrect = Math.max(0, batchTotal - failedIdiomIds.size);
                    const batchScore = Math.round((batchCorrect / batchTotal) * 100);
                    
                    if (isFullyComplete) {
                        const totalUnitQuestions = currentUnitData.length;
                        const finalCorrect = Math.max(0, totalUnitQuestions - unitFailedIdiomIds.size);
                        const finalScore = Math.round((finalCorrect / totalUnitQuestions) * 100);
                        document.getElementById('score-text').innerHTML = `本關耗時: ${Number(timeSpent).toFixed(2)} 秒<br><br><span class="text-2xl text-emerald-700">單元總得分: ${finalScore}分</span><br><span class="text-emerald-700 font-medium">總耗時: ${Number(unitTotalTime).toFixed(2)} 秒</span><br><span class="text-sm text-slate-500 font-medium">共 ${totalUnitQuestions} 題，一次答對 ${finalCorrect} 題</span>`;
                        document.getElementById('score-text').classList.remove('hidden');
                        document.getElementById('btn-rest').classList.add('hidden');
                        document.getElementById('btn-next-batch').classList.add('hidden');
                        document.getElementById('btn-show-leaderboard').classList.remove('hidden');
                        if (unitFailedIdiomIds.size > 0) {
                            document.getElementById('btn-review-unit').classList.remove('hidden');
                            document.getElementById('btn-finish-unit').classList.add('hidden');
                        } else {
                            document.getElementById('btn-review-unit').classList.add('hidden');
                            document.getElementById('btn-finish-unit').classList.remove('hidden');
                        }
                        
                        sendGameRecord(finalScore, unitTotalTime);

                        // 單元完成，將錯題存入錯題庫
                        if (!isReinforcementMode && unitFailedIdiomIds.size > 0) {
                            const unitTitle = document.getElementById('current-unit-title').textContent;
                            if (!unitTitle.includes('測驗') && !unitTitle.includes('生詞本')) {
                                const bank = allReviewBanks[unitTitle] || [];
                                unitFailedIdiomIds.forEach(id => {
                                    const item = allIdiomsData.find(i => i.idiom === id);
                                    if (item && !bank.some(i => i.idiom === item.idiom)) bank.push(item);
                                });
                                allReviewBanks[unitTitle] = bank;
                                syncUserData();
                            }
                        }
                    } else {
                        document.getElementById('score-text').innerHTML = `本關得分: ${batchScore} 分<br><span class="text-sm text-emerald-700">耗時: ${Number(timeSpent).toFixed(2)} 秒</span>`;
                        document.getElementById('score-text').classList.remove('hidden');
                        document.getElementById('btn-rest').classList.remove('hidden');
                        document.getElementById('btn-next-batch').classList.remove('hidden');
                        document.getElementById('btn-finish-unit').classList.add('hidden');
                        document.getElementById('btn-review-unit').classList.add('hidden');
                        document.getElementById('btn-show-leaderboard').classList.add('hidden');
                    }
                }, 800);
            }
        }

        function updateProgressText() {
            document.getElementById('progress-text').textContent = `${Math.min((batchIndex + 1) * BATCH_SIZE, currentUnitData.length)}/${currentUnitData.length}`;
        }

        function sendGameRecord(score, totalTime) {
            if (!GAS_API_URL || !currentUser) return;
            const unitTitle = document.getElementById('current-unit-title').textContent;
            
            if (unitTitle.includes('生詞本') || unitTitle.includes('測驗')) return; // 複習模式不列入排行榜

            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'saveGameRecord',
                    data: {
                        username: currentUser,
                        game: '成語連連看',
                        unit: unitTitle,
                        score: score,
                        timeSpent: totalTime,
                        wrongAnswers: wrongWords
                    }
                })
            }).catch(e => console.error(e));
        }

            document.getElementById('modal-success').classList.add('hidden');
            document.getElementById('modal-success').classList.remove('flex');
            showReviewScreen();
        });

        function showReviewScreen() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-review').classList.remove('hidden');
            
            const reviewContainer = document.getElementById('review-list');
            reviewContainer.innerHTML = '';
            
            unitFailedIdiomIds.forEach(id => {
                const item = allIdiomsData.find(i => i.idiom === id) || Array.from(vocabBook.values()).find(i => i.idiom === id);
                if (item) {
                    const div = document.createElement('div');
                    div.className = 'bg-amber-50 p-5 rounded-2xl border border-amber-200 relative flex justify-between items-start gap-4';
                    
                    const isStarred = vocabBook.has(item.idiom);
                    const starIconClass = isStarred ? 'ph-fill ph-star text-yellow-500' : 'ph-regular ph-star text-slate-300 hover:text-yellow-400';
                    
                    div.innerHTML = `
                        <div class="flex-1">
                            <h3 class="text-xl font-bold text-slate-800 mb-2">${item.idiom}</h3>
                            <p class="text-slate-700 font-medium whitespace-pre-wrap">${item.meaning}</p>
                        </div>
                        <button onclick="toggleVocab('${item.idiom}')" class="text-3xl transition-colors shrink-0">
                            <i class="${starIconClass}"></i>
                        </button>
                    `;
                    reviewContainer.appendChild(div);
                }
            });
        }

        document.getElementById('btn-review-back').addEventListener('click', () => {
            document.getElementById('screen-review').classList.add('hidden');
            currentUnitData = [];
            batchIndex = 0;
            clearProgress();
            returnToMenu();
        });

        document.getElementById('btn-reinforce').addEventListener('click', () => {
            document.getElementById('screen-review').classList.add('hidden');
            
            // Start reinforcement
            const reviewItems = Array.from(unitFailedIdiomIds).map(id => allIdiomsData.find(i => i.idiom === id) || Array.from(vocabBook.values()).find(i => i.idiom === id)).filter(Boolean);
            currentUnitData = shuffleArray(reviewItems);
            batchIndex = 0;
            failedIdiomIds.clear();
            unitFailedIdiomIds.clear(); // Reset so they don't loop forever
            clearProgress(); // Clear progress for the normal unit since they started reinforcement
            
            isReinforcementMode = true;
            document.getElementById('current-unit-title').textContent = "強化記憶測驗";
            document.getElementById('screen-game').classList.remove('hidden');
            renderBatch();
        });

        document.getElementById('btn-confirm-cancel').addEventListener('click', () => {
            document.getElementById('modal-confirm').classList.add('hidden');
            document.getElementById('modal-confirm').classList.remove('flex');
        });
        document.getElementById('btn-confirm-yes').addEventListener('click', () => {
            document.getElementById('modal-confirm').classList.add('hidden');
            document.getElementById('modal-confirm').classList.remove('flex');
            document.getElementById('modal-success').classList.add('hidden');
            document.getElementById('modal-success').classList.remove('flex');
            clearProgress();
            returnToMenu();
        });

        document.getElementById('btn-toggle-dict').addEventListener('click', () => {
            dictPosition = dictPosition === 'left' ? 'right' : 'left';
            localStorage.setItem('dictPosition', dictPosition);
            document.querySelectorAll('.dict-layout-container').forEach(container => {
                if (dictPosition === 'right') {
                    container.classList.remove('justify-start');
                    container.classList.add('flex-row-reverse');
                } else {
                    container.classList.remove('flex-row-reverse');
                    container.classList.add('justify-start');
                }
            });
        });

        function trackDictClick(word, dictType) {
            unitFailedIdiomIds.add(word); // Record as failed/reviewed for the review screen
            if (!GAS_API_URL) return;
            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'logDictClick',
                    data: {
                        username: currentUser || '訪客',
                        game: '成語連連看',
                        word: word,
                        dictType: dictType
                    }
                })
            }).catch(e => console.error(e));
        }

        function returnToMenu() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-menu').classList.remove('hidden');
            clearLines();
            isReinforcementMode = false;
            
            const unitTitle = document.getElementById('current-unit-title').textContent;
            if (!unitTitle.includes('測驗') && !unitTitle.includes('生詞本')) {
                if (allReviewBanks[unitTitle] && unitFailedIdiomIds.size === 0) {
                    delete allReviewBanks[unitTitle];
                    syncUserData();
                }
            }

            if (typeof updateStartButtons === 'function') updateStartButtons();
            if (typeof renderMenuButtons === 'function') renderMenuButtons();
        }

        function clearLines() {
            document.getElementById('svg-layer').innerHTML = '';
        }

        function drawAllLines() {
            clearLines();
            matchedPairs.forEach(pair => {
                drawLineBetween(pair.left, pair.right);
            });
        }

        function drawLineBetween(elem1, elem2) {
            const svg = document.getElementById('svg-layer');
            const svgRect = svg.getBoundingClientRect();
            const rect1 = elem1.getBoundingClientRect();
            const rect2 = elem2.getBoundingClientRect();

            const x1 = rect1.right - svgRect.left;
            const y1 = rect1.top + (rect1.height / 2) - svgRect.top;
            const x2 = rect2.left - svgRect.left;
            const y2 = rect2.top + (rect2.height / 2) - svgRect.top;

            const controlPointOffset = 50;
            const d = `M ${x1} ${y1} C ${x1 + controlPointOffset} ${y1}, ${x2 - controlPointOffset} ${y2}, ${x2} ${y2}`;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", "#22c55e");
            path.setAttribute("stroke-width", "4");
            path.setAttribute("stroke-linecap", "round");
            path.classList.add('path-line');

            svg.appendChild(path);
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('screen-game').classList.contains('hidden') === false) {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(drawAllLines, 100);
            }
        });

        function showToast(msg, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = msg;

            if (type === 'error') {
                toast.classList.replace('bg-slate-800', 'bg-red-600');
            } else {
                toast.classList.replace('bg-red-600', 'bg-slate-800');
            }

            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100', 'translate-y-4');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-4');
                toast.classList.add('opacity-0');
            }, 1000);
        }

        // 啟動系統
        init();

        // =================== 排行榜邏輯 ===================
        function fetchLeaderboard(retryCount = 3) {
            if (!GAS_API_URL) return;
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-500 font-medium"><i class="ph-bold ph-spinner animate-spin text-2xl mb-2"></i><br>載入中...</td></tr>`;
            
            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getLeaderboard', data: { game: '成語連連看' } })
            }).then(res => res.json()).then(res => {
                if (res.status === 'success') {
                    leaderboardDataCache = res.data;
                    renderLeaderboard();
                } else {
                    if (retryCount > 0) { setTimeout(() => fetchLeaderboard(retryCount - 1), 1000); }
                    else { tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-red-500 font-medium">載入失敗</td></tr>`; }
                }
            }).catch(e => {
                console.error(e);
                if (retryCount > 0) { setTimeout(() => fetchLeaderboard(retryCount - 1), 1000); }
                else { tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-red-500 font-medium">載入失敗</td></tr>`; }
            });
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            const unitFilter = document.getElementById('leaderboard-unit-select').value;
            
            let data = leaderboardDataCache;
            if (unitFilter !== 'all') {
                data = data.filter(r => r.unit === unitFilter);
            }
            
            data.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.timeSpent - b.timeSpent;
            });
            
            data = data.slice(0, 10);
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-500 font-medium">目前還沒有紀錄喔！成為第一個上榜的人吧！</td></tr>`;
                return;
            }
            
            tbody.innerHTML = '';
            data.forEach((record, idx) => {
                const tr = document.createElement('tr');
                tr.className = `border-b border-slate-100 last:border-b-0 hover:bg-indigo-50 transition-colors ${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`;
                
                let rankHtml = `<span class="text-slate-500 px-2">${idx + 1}</span>`;
                if (idx === 0) rankHtml = `<span class="text-yellow-500 text-xl"><i class="ph-fill ph-medal"></i> 1</span>`;
                else if (idx === 1) rankHtml = `<span class="text-slate-400 text-xl"><i class="ph-fill ph-medal"></i> 2</span>`;
                else if (idx === 2) rankHtml = `<span class="text-amber-700 text-xl"><i class="ph-fill ph-medal"></i> 3</span>`;
                
                tr.innerHTML = `
                    <td class="py-3 px-4 font-black">${rankHtml}</td>
                    <td class="py-3 px-4 font-bold text-slate-700">${record.username}</td>
                    <td class="py-3 px-4 text-sm text-slate-600">${record.unit}</td>
                    <td class="py-3 px-4 font-bold text-emerald-600">${record.score}分</td>
                    <td class="py-3 px-4 font-medium text-blue-600">${Number(record.timeSpent).toFixed(2)}秒</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('btn-leaderboard').addEventListener('click', () => {
            document.getElementById('modal-leaderboard').classList.remove('hidden');
            document.getElementById('modal-leaderboard').classList.add('flex');
            
            const unitSelect = document.getElementById('unit-select');
            const leaderboardUnitSelect = document.getElementById('leaderboard-unit-select');
            
            // Populating options
            leaderboardUnitSelect.innerHTML = '<option value="all">所有單元 (綜合)</option>';
            Array.from(unitSelect.options).forEach(opt => {
                if(opt.value && !opt.disabled) {
                    const newOpt = document.createElement('option');
                    newOpt.value = opt.value;
                    newOpt.textContent = opt.textContent;
                    leaderboardUnitSelect.appendChild(newOpt);
                }
            });
            
            leaderboardUnitSelect.value = unitSelect.value || 'all';
            fetchLeaderboard();
        });

        document.getElementById('btn-show-leaderboard').addEventListener('click', () => {
            document.getElementById('modal-success').classList.add('hidden');
            document.getElementById('modal-success').classList.remove('flex');
            document.getElementById('modal-leaderboard').classList.remove('hidden');
            document.getElementById('modal-leaderboard').classList.add('flex');
            
            const unitSelect = document.getElementById('unit-select');
            const leaderboardUnitSelect = document.getElementById('leaderboard-unit-select');
            
            leaderboardUnitSelect.innerHTML = '<option value="all">所有單元 (綜合)</option>';
            Array.from(unitSelect.options).forEach(opt => {
                if(opt.value && !opt.disabled) {
                    const newOpt = document.createElement('option');
                    newOpt.value = opt.value;
                    newOpt.textContent = opt.textContent;
                    leaderboardUnitSelect.appendChild(newOpt);
                }
            });

            leaderboardUnitSelect.value = document.getElementById('current-unit-title').textContent || 'all';
            fetchLeaderboard();
        });

        document.getElementById('btn-close-leaderboard').addEventListener('click', () => {
            document.getElementById('modal-leaderboard').classList.add('hidden');
            document.getElementById('modal-leaderboard').classList.remove('flex');
        });

        document.getElementById('leaderboard-unit-select').addEventListener('change', renderLeaderboard);

    </script>
</body>

</html>
